<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>TRON Transfer</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- WalletConnect & Ethers (used for WC session management) -->
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/sign-client@2.17.0/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/utils@2.17.0/dist/index.umd.js"></script>

  <style>
    :root {
      --red:    #ff2d2d;
      --cyan:   #00f5ff;
      --dark:   #050a12;
      --panel:  #0b1524;
      --border: #1a3a5c;
      --text:   #c8dff0;
      --dim:    #4a7a9b;
      --glow-r: 0 0 18px rgba(255,45,45,.55);
      --glow-c: 0 0 18px rgba(0,245,255,.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── scan-line ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.18) 2px,
        rgba(0,0,0,.18) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative; z-index: 2;
      width: 100%; max-width: 480px;
      padding: 16px;
    }

    /* ── header ── */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-title {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: .25em;
      color: var(--cyan);
      text-shadow: var(--glow-c);
      text-transform: uppercase;
    }
    .logo-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      color: var(--dim);
      letter-spacing: .15em;
      margin-top: 4px;
    }

    /* ── card ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: .6;
    }

    /* ── wallet status ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding: 10px 14px;
      background: rgba(0,0,0,.35);
      border: 1px solid var(--border);
      border-radius: 2px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .dot.connected { background: var(--cyan); box-shadow: var(--glow-c); }
    .dot.error     { background: var(--red);  box-shadow: var(--glow-r); }
    .status-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: .78rem;
      color: var(--dim);
      word-break: break-all;
    }
    .status-text.live { color: var(--cyan); }

    /* ── section label ── */
    .label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      letter-spacing: .18em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── input ── */
    .input-group { margin-bottom: 20px; }
    input[type="number"], input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,.5);
      border: 1px solid var(--border);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      padding: 12px 14px;
      border-radius: 2px;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
      -moz-appearance: textfield;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; }
    input:focus {
      border-color: var(--cyan);
      box-shadow: var(--glow-c);
    }

    /* ── receiver display ── */
    .receiver-box {
      padding: 12px 14px;
      background: rgba(0,0,0,.35);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      color: var(--dim);
      word-break: break-all;
      margin-bottom: 20px;
    }
    .receiver-box span { color: var(--text); }

    /* ── button ── */
    .btn {
      width: 100%;
      padding: 15px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-connect {
      background: linear-gradient(135deg, #003d5c 0%, #005580 100%);
      border: 1px solid var(--cyan);
      color: var(--cyan);
      box-shadow: var(--glow-c);
    }
    .btn-send {
      background: linear-gradient(135deg, #5c0000 0%, #800000 100%);
      border: 1px solid var(--red);
      color: #fff;
      box-shadow: var(--glow-r);
    }
    .btn-send:not(:disabled):hover { background: linear-gradient(135deg,#7a0000,#a00000); }

    /* ── tx result ── */
    .tx-result {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      word-break: break-all;
      display: none;
    }
    .tx-result.success {
      display: block;
      background: rgba(0,245,255,.07);
      border: 1px solid var(--cyan);
      color: var(--cyan);
    }
    .tx-result.fail {
      display: block;
      background: rgba(255,45,45,.07);
      border: 1px solid var(--red);
      color: var(--red);
    }

    /* ── spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ── QR modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--panel);
      border: 1px solid var(--cyan);
      border-radius: 4px;
      padding: 24px;
      text-align: center;
      max-width: 340px;
      width: 90%;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--cyan);
      margin-bottom: 14px;
    }
    #qrCanvas { border-radius: 4px; }
    .modal-uri {
      font-family: 'Share Tech Mono', monospace;
      font-size: .6rem;
      color: var(--dim);
      margin-top: 10px;
      word-break: break-all;
    }
    .btn-close {
      margin-top: 12px;
      padding: 8px 24px;
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      letter-spacing: .12em;
      cursor: pointer;
      border-radius: 2px;
    }
    .btn-close:hover { border-color: var(--red); color: var(--red); }

    /* ── footer ── */
    .footer {
      margin-top: 20px;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: .6rem;
      color: var(--border);
      letter-spacing: .12em;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-title">⚡ TRX SEND</div>
    <div class="logo-sub">TRON NETWORK · TRUST WALLET</div>
  </div>

  <div class="card">

    <!-- Status -->
    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <div class="status-text" id="statusText">NOT CONNECTED</div>
    </div>

    <!-- Connect button -->
    <button class="btn btn-connect" id="btnConnect" onclick="connectWallet()">
      CONNECT WALLET
    </button>

    <!-- Transfer form (hidden until connected) -->
    <div id="transferSection" style="display:none; margin-top:24px;">

      <div class="input-group">
        <div class="label">Amount (TRX)</div>
        <input type="number" id="amountInput" placeholder="0.000000" min="0.000001" step="any" />
      </div>

      <div class="label">Receiver Address</div>
      <div class="receiver-box">
        TO: <span>TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</span>
      </div>

      <button class="btn btn-send" id="btnSend" onclick="sendTRX()">
        SEND TRX
      </button>

      <div class="tx-result" id="txResult"></div>
    </div>

  </div>

  <div class="footer">POWERED BY WALLETCONNECT v2 · TRON MAINNET</div>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="qrModal">
  <div class="modal-box">
    <div class="modal-title">SCAN WITH TRUST WALLET</div>
    <canvas id="qrCanvas" width="220" height="220"></canvas>
    <div class="modal-uri" id="qrUri"></div>
    <button class="btn-close" onclick="closeModal()">CANCEL</button>
  </div>
</div>

<!-- QR code lib (pure JS, no external dependency) -->
<script>
/* ── tiny QR encoder (MIT) from https://github.com/soldair/node-qrcode bundled) ── */
/* We load the CDN version */
</script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const WC_PROJECT_ID   = '171db6da15a54effc1b4a06f889a3c3f';
const RECEIVER_ADDR   = 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV';
const TRON_CHAIN_ID   = 'tron:0x2b6653dc'; // mainnet
const TRON_NODE_URL   = 'https://api.trongrid.io';

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let signClient   = null;
let wcSession    = null;
let walletAddr   = null;

// ═══════════════════════════════════════════════════════════
//  UI helpers
// ═══════════════════════════════════════════════════════════
function setStatus(msg, type = '') {
  const dot  = document.getElementById('dot');
  const text = document.getElementById('statusText');
  dot.className  = 'dot' + (type ? ' ' + type : '');
  text.className = 'status-text' + (type === 'connected' ? ' live' : '');
  text.textContent = msg;
}

function showTransfer(show) {
  document.getElementById('transferSection').style.display = show ? 'block' : 'none';
  document.getElementById('btnConnect').style.display      = show ? 'none'  : 'block';
}

function showTxResult(msg, ok) {
  const el = document.getElementById('txResult');
  el.className   = 'tx-result ' + (ok ? 'success' : 'fail');
  el.textContent = msg;
}

function setBtnSending(yes) {
  const b = document.getElementById('btnSend');
  b.disabled   = yes;
  b.innerHTML  = yes
    ? '<span class="spinner"></span>BROADCASTING…'
    : 'SEND TRX';
}

function closeModal() {
  document.getElementById('qrModal').classList.remove('show');
}

async function showQR(uri) {
  document.getElementById('qrUri').textContent = uri;
  await QRCode.toCanvas(document.getElementById('qrCanvas'), uri, {
    width: 220, margin: 1,
    color: { dark: '#00f5ff', light: '#0b1524' }
  });
  document.getElementById('qrModal').classList.add('show');
}

// ═══════════════════════════════════════════════════════════
//  Base58 ↔ HEX helpers (for TRON addresses)
// ═══════════════════════════════════════════════════════════
const B58_ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';

function base58ToHex(addr) {
  let n = BigInt(0);
  for (const c of addr) {
    const idx = B58_ALPHABET.indexOf(c);
    if (idx < 0) throw new Error('Bad base58 char');
    n = n * 58n + BigInt(idx);
  }
  let hex = n.toString(16);
  if (hex.length % 2) hex = '0' + hex;
  // strip 4-byte checksum (last 8 hex chars) and version byte (first 2 hex)
  // actually full payload is 25 bytes = 50 hex; strip last 4 bytes (8 chars)
  return '41' + hex.slice(2, hex.length - 8);   // 0x41 prefix = mainnet
}

function hexToBase58(hex) {
  const bytes = new Uint8Array(hex.match(/.{2}/g).map(b => parseInt(b, 16)));
  // sha256d checksum
  async function sha256(buf) {
    return new Uint8Array(await crypto.subtle.digest('SHA-256', buf));
  }
  // We'll use the sync path already built into TronWeb if available, else inline
  // For this app we only need base58 → hex, so this fn is a placeholder
}

// Full address to hex (sync)
function tronAddrToHex(addr) {
  try { return base58ToHex(addr); } catch { return null; }
}

// ═══════════════════════════════════════════════════════════
//  CONNECT WALLET
// ═══════════════════════════════════════════════════════════
async function connectWallet() {
  try {
    setStatus('INITIALISING…');
    document.getElementById('btnConnect').disabled = true;

    // Detect in-app browser (Trust Wallet injects tronWeb or ethereum)
    const hasTronLink = window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58;

    if (hasTronLink) {
      // ── In-app: TronLink / TrustWallet injected provider ──
      walletAddr = window.tronWeb.defaultAddress.base58;
      setStatus(walletAddr, 'connected');
      showTransfer(true);
      return;
    }

    // ── External browser: WalletConnect v2 ──
    const { SignClient } = window.WalletConnectSignClient || window.SignClient || {};

    // SDK might be under different namespace depending on build
    const SDK = window['@walletconnect/sign-client'] || window.WalletConnectSignClient || window.SignClient;

    if (!SDK && !window.WalletConnectSignClient) {
      // Try the UMD global set by the CDN script
      await initWalletConnect();
      return;
    }

    await initWalletConnect();

  } catch (err) {
    console.error(err);
    setStatus('ERROR: ' + err.message, 'error');
    document.getElementById('btnConnect').disabled = false;
  }
}

async function initWalletConnect() {
  // The CDN exposes the lib as window.WalletConnectSignClient or inside the
  // default export. We probe multiple locations.
  let CreateSignClient =
        (window.WalletConnectSignClient && window.WalletConnectSignClient.SignClient) ||
        (window.SignClient) ||
        null;

  if (!CreateSignClient) {
    // last-resort: the CDN bundle sets globalThis["@walletconnect/sign-client"]
    const ns = Object.keys(window).find(k => k.includes('walletconnect') || k.includes('WalletConnect'));
    if (ns) CreateSignClient = window[ns].SignClient || window[ns];
  }

  if (!CreateSignClient) {
    throw new Error('WalletConnect SDK not loaded. Please refresh and try again.');
  }

  signClient = await CreateSignClient.init({
    projectId: WC_PROJECT_ID,
    metadata: {
      name:        'TRX Send',
      description: 'Send TRX on TRON Network',
      url:         window.location.href,
      icons:       ['https://cryptologos.cc/logos/tron-trx-logo.png']
    }
  });

  // Check for existing sessions
  const sessions = signClient.session.getAll();
  if (sessions.length > 0) {
    wcSession  = sessions[sessions.length - 1];
    const accs = wcSession.namespaces?.tron?.accounts || [];
    if (accs.length > 0) {
      walletAddr = accs[0].split(':')[2];
      setStatus(walletAddr, 'connected');
      showTransfer(true);
      document.getElementById('btnConnect').disabled = false;
      return;
    }
  }

  // Create new pairing
  const { uri, approval } = await signClient.connect({
    requiredNamespaces: {
      tron: {
        methods:  ['tron_signTransaction', 'tron_signMessage'],
        chains:   [TRON_CHAIN_ID],
        events:   []
      }
    }
  });

  if (uri) {
    setStatus('WAITING FOR WALLET…');
    await showQR(uri);
  }

  // Wait for approval
  wcSession = await approval();
  closeModal();

  const accs = wcSession.namespaces?.tron?.accounts || [];
  if (accs.length === 0) throw new Error('No Tron account returned from wallet.');

  walletAddr = accs[0].split(':')[2];
  setStatus(walletAddr, 'connected');
  showTransfer(true);
  document.getElementById('btnConnect').disabled = false;

  // ── session_delete listener ──
  signClient.on('session_delete', () => {
    wcSession  = null;
    walletAddr = null;
    showTransfer(false);
    setStatus('DISCONNECTED', 'error');
  });
}

// ═══════════════════════════════════════════════════════════
//  BUILD TRON TRANSACTION (exactly as TronScan / TronWeb)
// ═══════════════════════════════════════════════════════════
async function buildTransferTx(fromAddr, toAddr, amountSUN) {
  // Use TronGrid API to build the raw TX — same endpoint TronScan uses
  const body = {
    owner_address:  fromAddr,
    to_address:     toAddr,
    amount:         amountSUN,
    visible:        true          // base58 addresses
  };

  const resp = await fetch(`${TRON_NODE_URL}/wallet/createtransaction`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(body)
  });

  if (!resp.ok) throw new Error(`TronGrid HTTP ${resp.status}`);
  const tx = await resp.json();
  if (tx.Error || tx.error) throw new Error(tx.Error || tx.error);
  if (!tx.txID)             throw new Error('Invalid TX response from node');
  return tx;
}

// ═══════════════════════════════════════════════════════════
//  BROADCAST
// ═══════════════════════════════════════════════════════════
async function broadcastTx(signedTx) {
  const resp = await fetch(`${TRON_NODE_URL}/wallet/broadcasttransaction`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(signedTx)
  });
  if (!resp.ok) throw new Error(`Broadcast HTTP ${resp.status}`);
  const result = await resp.json();
  return result;
}

// ═══════════════════════════════════════════════════════════
//  SEND TRX
// ═══════════════════════════════════════════════════════════
async function sendTRX() {
  const amtStr = document.getElementById('amountInput').value.trim();
  if (!amtStr || isNaN(parseFloat(amtStr)) || parseFloat(amtStr) <= 0) {
    showTxResult('⚠ Enter a valid TRX amount.', false);
    return;
  }

  const amountTRX = parseFloat(amtStr);
  const amountSUN = Math.round(amountTRX * 1_000_000); // 1 TRX = 1,000,000 SUN

  setBtnSending(true);
  showTxResult('', false);

  try {
    // ── Build raw TX via TronGrid ──
    setStatus('BUILDING TX…', 'connected');
    const rawTx = await buildTransferTx(walletAddr, RECEIVER_ADDR, amountSUN);

    let signedTx;

    // ── Sign ──
    if (window.tronWeb && window.tronWeb.trx) {
      // Injected provider (in-app browser)
      setStatus('SIGN IN WALLET…', 'connected');
      signedTx = await window.tronWeb.trx.sign(rawTx);
    } else if (signClient && wcSession) {
      // WalletConnect
      setStatus('SIGN IN WALLET…', 'connected');
      const result = await signClient.request({
        topic:   wcSession.topic,
        chainId: TRON_CHAIN_ID,
        request: {
          method: 'tron_signTransaction',
          params: { address: walletAddr, transaction: rawTx }
        }
      });
      // TrustWallet returns { signature } or the full signed tx
      if (result && result.signature) {
        signedTx = { ...rawTx, signature: [result.signature] };
      } else if (result && result.transaction) {
        signedTx = result.transaction;
      } else if (result && Array.isArray(result)) {
        signedTx = { ...rawTx, signature: result };
      } else {
        signedTx = result;
      }
    } else {
      throw new Error('Wallet not connected');
    }

    if (!signedTx || !signedTx.signature) {
      throw new Error('Signing failed or rejected by user');
    }

    // ── Broadcast ──
    setStatus('BROADCASTING…', 'connected');
    const bResult = await broadcastTx(signedTx);

    if (bResult.result === true || bResult.code === 'SUCCESS') {
      const txid = signedTx.txID || rawTx.txID;
      setStatus(walletAddr, 'connected');
      showTxResult(
        `✅ TX SUCCESS\nTX ID: ${txid}\nView: https://tronscan.org/#/transaction/${txid}`,
        true
      );
      document.getElementById('amountInput').value = '';
    } else {
      const msg = bResult.message
        ? atob(bResult.message)
        : (bResult.code || JSON.stringify(bResult));
      throw new Error('Broadcast failed: ' + msg);
    }

  } catch (err) {
    console.error(err);
    setStatus(walletAddr, 'connected');
    showTxResult('❌ ' + err.message, false);
  } finally {
    setBtnSending(false);
  }
}

// ═══════════════════════════════════════════════════════════
//  AUTO-CONNECT on page load (in-app browser only)
// ═══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  if (window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58) {
    walletAddr = window.tronWeb.defaultAddress.base58;
    setStatus(walletAddr, 'connected');
    showTransfer(true);
    document.getElementById('btnConnect').style.display = 'none';
  }
});
</script>
</body>
</html>
