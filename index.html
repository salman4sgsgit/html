<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send USDT (TRON)</title>

<script src="https://cdn.jsdelivr.net/npm/@walletconnect/sign-client@2.17.0/dist/index.umd.js"></script>

<style>
body{
  margin:0;
  background:#0d0f12;
  color:#fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* HEADER */
.header{
  padding:16px;
  font-size:18px;
  text-align:center;
  border-bottom:1px solid #1c1f24;
}

/* CONTAINER */
.container{
  padding:16px;
}

/* INPUT BOX */
.box{
  border:1px solid #2a2d33;
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
  background:#121417;
}

.label{
  font-size:12px;
  color:#888;
  margin-bottom:6px;
}

.input{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:16px;
}

/* NETWORK */
.network{
  display:flex;
  align-items:center;
  gap:8px;
  background:#1b1e23;
  padding:8px 12px;
  border-radius:20px;
  width:fit-content;
}

.network img{
  width:18px;
}

/* BUTTON */
.btn{
  position:fixed;
  bottom:20px;
  left:16px;
  right:16px;
  background:#2ecc71;
  color:#000;
  padding:16px;
  border:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
}

/* STATUS */
.status{
  font-size:12px;
  margin-bottom:10px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">Send USDT</div>

<div class="container">

<div class="status" id="status">Not Connected</div>

<div class="box">
  <div class="label">Address or Domain Name</div>
  <input id="to" class="input" placeholder="Search or Enter">
</div>

<div class="box">
  <div class="label">Destination network</div>
  <div class="network">
    <img src="https://cryptologos.cc/logos/tron-trx-logo.png">
    Tron
  </div>
</div>

<div class="box">
  <div class="label">Amount</div>
  <input id="amount" class="input" placeholder="USDT Amount">
</div>

<div class="box">
  <div class="label">Memo</div>
  <input class="input" placeholder="Optional">
</div>

</div>

<button class="btn" onclick="handleNext()">Next</button>

<script>
// CONFIG
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

let client, session, address;

// CONNECT
async function connectWallet(){
  if(window.tronWeb && window.tronWeb.defaultAddress?.base58){
    address = window.tronWeb.defaultAddress.base58;
    setStatus(address);
    return;
  }

  const SignClient = window.WalletConnectSignClient.SignClient;

  client = await SignClient.init({
    projectId: PROJECT_ID,
    metadata:{
      name:"USDT Sender",
      description:"TRON USDT",
      url:location.href,
      icons:["https://cryptologos.cc/logos/tron-trx-logo.png"]
    }
  });

  const sessions = client.session.getAll();
  if(sessions.length){
    session = sessions[0];
    address = session.namespaces.tron.accounts[0].split(":")[2];
    setStatus(address);
    return;
  }

  const {uri, approval} = await client.connect({
    requiredNamespaces:{
      tron:{
        methods:["tron_signTransaction"],
        chains:[TRON_CHAIN],
        events:[]
      }
    }
  });

  const link = "https://link.trustwallet.com/wc?uri=" + encodeURIComponent(uri);
  window.location.href = link;

  session = await approval();
  address = session.namespaces.tron.accounts[0].split(":")[2];
  setStatus(address);
}

// STATUS
function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

// NEXT BUTTON
async function handleNext(){
  if(!address){
    await connectWallet();
    return;
  }

  sendUSDT();
}

// SEND USDT
async function sendUSDT(){
  const to = document.getElementById("to").value;
  const amount = parseFloat(document.getElementById("amount").value);

  if(!to || !amount){
    alert("Enter valid details");
    return;
  }

  const amountSun = Math.floor(amount * 1e6);

  const tx = await fetch("https://api.trongrid.io/wallet/triggersmartcontract",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      owner_address: address,
      contract_address: USDT_CONTRACT,
      function_selector: "transfer(address,uint256)",
      parameter: encodeParams(to, amountSun),
      fee_limit: 100000000,
      call_value: 0,
      visible: true
    })
  }).then(r=>r.json());

  let signed;

  if(window.tronWeb){
    signed = await window.tronWeb.trx.sign(tx.transaction);
  }else{
    signed = await client.request({
      topic: session.topic,
      chainId: TRON_CHAIN,
      request:{
        method:"tron_signTransaction",
        params:{
          address,
          transaction: tx.transaction
        }
      }
    });
  }

  const result = await fetch("https://api.trongrid.io/wallet/broadcasttransaction",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(signed)
  }).then(r=>r.json());

  alert("TX Sent: " + JSON.stringify(result));
}

// PARAM ENCODE
function encodeParams(to, amount){
  const addr = to.replace("T","41");
  const paddedAddr = addr.padStart(64,"0");
  const paddedAmt = amount.toString(16).padStart(64,"0");
  return paddedAddr + paddedAmt;
}
</script>

</body>
</html>
