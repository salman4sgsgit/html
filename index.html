<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send USDT</title>

<link rel="icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">

<script src="https://unpkg.com/@walletconnect/sign-client@2.17.0/dist/index.umd.js"></script>

<style>
body{margin:0;background:#0d0f12;color:#fff;font-family:-apple-system}
.header{padding:16px;text-align:center;border-bottom:1px solid #222}
.container{padding:16px}
.box{border:1px solid #2a2d33;border-radius:12px;padding:14px;margin-bottom:16px;background:#121417}
.label{font-size:12px;color:#888;margin-bottom:6px}
.input{width:100%;background:none;border:none;color:#fff;font-size:16px}
.network{display:flex;align-items:center;gap:8px;background:#1b1e23;padding:8px 12px;border-radius:20px;width:fit-content}
.network img{width:18px}
.receiver{font-size:13px;color:#ccc;word-break:break-all}
.btn{position:fixed;bottom:20px;left:16px;right:16px;background:#2ecc71;color:#000;padding:16px;border:none;border-radius:30px;font-size:18px;font-weight:bold}
.status{font-size:12px;color:#aaa;margin-bottom:10px}
</style>
</head>

<body>

<div class="header">Send USDT</div>

<div class="container">
  <div id="status" class="status">Ready</div>

  <div class="box">
    <div class="label">Address</div>
    <div class="receiver">TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</div>
  </div>

  <div class="box">
    <div class="label">Network</div>
    <div class="network">
      <img src="https://cryptologos.cc/logos/tron-trx-logo.png"> Tron
    </div>
  </div>

  <div class="box">
    <div class="label">Amount</div>
    <input id="amount" class="input" placeholder="USDT Amount">
  </div>
</div>

<button class="btn" onclick="handleNext()">Next</button>

<script>
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const RECEIVER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

let client = null;
let session = null;
let address = null;

function setStatus(t){
  document.getElementById("status").innerText = t;
}

// 🔥 WAIT FOR SDK
async function waitForWC(){
  return new Promise(resolve=>{
    const check=()=>{
      if(window.SignClient || window.WalletConnectSignClient){
        resolve();
      } else {
        setTimeout(check,100);
      }
    };
    check();
  });
}

// 🔥 INIT CLIENT SAFELY
async function ensureClient(){
  if(client) return;

  await waitForWC();

  const SignClient = window.SignClient || window.WalletConnectSignClient.SignClient;

  client = await SignClient.init({
    projectId: PROJECT_ID,
    metadata:{
      name:"USDT Sender",
      description:"TRON",
      url: location.href,
      icons:["https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png"]
    }
  });

  // restore session
  const sessions = client.session.getAll();
  if(sessions.length){
    session = sessions[0];
    address = session.namespaces.tron.accounts[0].split(":")[2];
    setStatus("Connected: " + address);
  }
}

// 🔥 CONNECT
async function connectWallet(amount){
  setStatus("Opening wallet...");

  await ensureClient();

  const { uri } = await client.connect({
    requiredNamespaces:{
      tron:{
        methods:["tron_signTransaction"],
        chains:[TRON_CHAIN],
        events:[]
      }
    }
  });

  if(uri){
    localStorage.setItem("pending_amount", amount);

    window.location.href =
      "https://link.trustwallet.com/wc?uri=" + encodeURIComponent(uri);
  }
}

// 🔥 MAIN FLOW
async function handleNext(){
  const amount = parseFloat(document.getElementById("amount").value);
  if(!amount) return alert("Enter amount");

  await ensureClient();

  if(!address){
    await connectWallet(amount);
    return;
  }

  await sendUSDT(amount);
}

// 🔥 RESTORE AFTER RETURN
window.addEventListener("load", async ()=>{
  await ensureClient();

  const pending = localStorage.getItem("pending_amount");
  if(address && pending){
    localStorage.removeItem("pending_amount");
    await sendUSDT(parseFloat(pending));
  }
});

// 🔥 SEND
async function sendUSDT(amount){
  try{
    setStatus("Preparing transaction...");

    const sun = Math.floor(amount * 1e6);
    const addrHex = base58ToHex(RECEIVER).replace("41","");
    const paddedAddr = addrHex.padStart(64,"0");
    const paddedAmt = sun.toString(16).padStart(64,"0");

    const tx = await fetch("https://api.trongrid.io/wallet/triggersmartcontract",{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        owner_address: address,
        contract_address: USDT,
        function_selector:"transfer(address,uint256)",
        parameter:paddedAddr+paddedAmt,
        fee_limit:100000000,
        visible:true
      })
    }).then(r=>r.json());

    const signed = await client.request({
      topic: session.topic,
      chainId: TRON_CHAIN,
      request:{
        method:"tron_signTransaction",
        params:{ address, transaction: tx.transaction }
      }
    });

    await fetch("https://api.trongrid.io/wallet/broadcasttransaction",{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(signed)
    });

    setStatus("Transaction sent");
    alert("Transaction Sent");

  }catch(e){
    console.error(e);
    alert("Error: " + e.message);
  }
}

// helper
const ALPHABET="123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function base58ToHex(addr){
  let num=BigInt(0);
  for(let c of addr){
    num=num*58n+BigInt(ALPHABET.indexOf(c));
  }
  let hex=num.toString(16);
  if(hex.length%2) hex="0"+hex;
  return "41"+hex.slice(2,-8);
}
</script>

</body>
</html>
